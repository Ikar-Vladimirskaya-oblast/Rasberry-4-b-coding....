name: Raspberry app check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies for smoke checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask websockets

      - name: Compile Python files
        run: python -m compileall -q .

      - name: Start Flask app and check health
        run: |
          python app.py &
          app_pid=$!
          trap "kill $app_pid" EXIT
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5000/api/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1
