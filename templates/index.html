<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-title">
          <p class="topbar-kicker">Raspberry Pi Local MVP</p>
          <h1>RFID / NFC тестовый стенд</h1>
          <p class="topbar-copy">Локальный сервис для PN532, логов и проверки чтения карт.</p>
        </div>
        <div class="topbar-actions">
          <span class="status-pill" id="systemOnlinePill">Офлайн</span>
          <button class="ghost-button" id="refreshButton" type="button">Обновить</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="section-label">System Status</p>
              <h2>Состояние системы</h2>
            </div>
            <span class="socket-badge offline" id="socketBadge">WS offline</span>
          </div>
          <div class="summary-grid">
            <article class="summary-card">
              <span class="metric-label">Backend</span>
              <strong class="metric-value" id="systemState">Офлайн</strong>
            </article>
            <article class="summary-card">
              <span class="metric-label">Ридеры</span>
              <strong class="metric-value" id="readerCount">0</strong>
            </article>
            <article class="summary-card">
              <span class="metric-label">Последнее событие</span>
              <strong class="metric-value" id="lastEventTime">Нет событий</strong>
            </article>
          </div>
        </section>

        <div class="main-grid">
          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Readers</p>
                <h2>Ридеры</h2>
              </div>
            </div>
            <div class="readers-grid" id="readersGrid"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Events Log</p>
                <h2>Журнал событий</h2>
              </div>
            </div>
            <div class="log-list" id="logsList"></div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
